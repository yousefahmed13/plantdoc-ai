name: plantdoc_ai
description: "PlantDoc AI — bilingual (AR/EN) plant pathologist chatbot. Native Flutter client for the PlantDoc FastAPI backend."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  http: ^1.2.2

  image_picker: ^1.1.2
  image_picker_for_web: ^3.0.5
  cross_file: ^0.3.4+2

  shared_preferences: ^2.3.2

  uuid: ^4.5.1

  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon_512.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
